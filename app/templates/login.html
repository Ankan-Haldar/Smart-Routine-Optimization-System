<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Routine Login</title>

    <!-- GOOGLE FONT -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- LOGIN CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='login.css') }}">

</head>

<body>

<!-- BACKGROUND GLOW -->

<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>

<!-- LOGIN SECTION -->

<div class="login-container">

    <!-- LEFT SIDE -->

    <div class="login-left">

        <span class="login-tag">
            ✨ AI Powered Scheduler
        </span>

        <h1>
            Smart Routine <br>
            Optimization System
        </h1>

        <p>
            Intelligent university routine generation
            with advanced AI-powered scheduling,
            faculty management and automation.
        </p>

        <!-- AI GLOBE -->

        <div class="mini-globe">

            <div class="mini-ring ring-a"></div>
            <div class="mini-ring ring-b"></div>

            <div class="mini-core">
                AI
            </div>

        </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="login-right">

        <div class="login-card">

            <h2>
                Welcome Back 👋
            </h2>

            <p class="sub-text">
                Login to continue
            </p>

            <!-- ERROR -->

            {% if error %}

            <div class="error-box">
                {{ error }}
            </div>

            {% endif %}

            <!-- FORM -->

            <form method="POST">

                <div class="input-group">

                    <input type="text"
                           name="username"
                           placeholder="Username"
                           required>

                </div>

                <div class="input-group password-box">

                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Password"
                           required>

                    <span onclick="togglePassword()">

                        👁️

                    </span>

                </div>

                <button type="submit"
                        class="btn-login">

                    Login

                </button>

                <a href="/"
                   class="back-btn">

                    ← Back to Dashboard

                </a>

            </form>

        </div>

    </div>

</div>

<script>

function togglePassword(){

    let pass =
        document.getElementById(
            "password"
        );

    pass.type =
        pass.type === "password"
        ? "text"
        : "password";
}

</script>

</body>

</html>
