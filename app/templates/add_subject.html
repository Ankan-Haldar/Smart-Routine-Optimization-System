{% extends "base.html" %}

{% block title %}
Add Subject
{% endblock %}

{% block content %}

<link rel="stylesheet"
      href="{{ url_for('static', filename='add_subject.css') }}">

<div class="add-subject-page">

    <!-- HEADER -->

    <div class="page-header">

        <span class="page-tag">
            📘 Academic Management
        </span>

        <h1>
            Add Subject
        </h1>

        <p>
            Create and manage academic subjects,
            semesters and intelligent scheduling data.
        </p>

    </div>

    <!-- FORM CARD -->

    <div class="form-card">

        <form method="POST"
              id="subjectForm">

            <div id="subjects">

                <!-- SUBJECT BLOCK -->

                <div class="subject-block">

                    <h3>
                        Subject Information
                    </h3>

                    <!-- YEAR -->

                    <div class="row">

                        <label>
                            Year
                        </label>

                        <select name="year[]">

                            <option value="MCA">
                                MCA
                            </option>

                            <option value="BCA">
                                BCA
                            </option>

                        </select>

                    </div>

                    <!-- SEMESTER -->

                    <div class="row">

                        <label>
                            Semester
                        </label>

                        <select name="semester[]">

                            <option value="1">1</option>

                            <option value="2">2</option>

                            <option value="3">3</option>

                            <option value="4">4</option>

                        </select>

                    </div>

                    <!-- SECTION -->

                    <div class="row">

                        <label>
                            Section
                        </label>

                        <select name="section[]">

                            <option value="A">
                                A
                            </option>

                            <option value="B">
                                B
                            </option>

                        </select>

                    </div>

                    <!-- SUBJECT CODE -->

                    <div class="row">

                        <label>
                            Subject Code
                        </label>

                        <input type="text"
                               name="subject_code[]"
                               placeholder="Enter subject code"
                               required>

                    </div>

                    <!-- SUBJECT NAME -->

                    <div class="row">

                        <label>
                            Subject Name
                        </label>

                        <input type="text"
                               name="subject[]"
                               placeholder="Enter subject name"
                               required>

                    </div>

                    <!-- TYPE -->

                    <div class="row">

                        <label>
                            Subject Type
                        </label>

                        <select name="type[]">

                            <option value="theory">
                                Theory
                            </option>

                            <option value="lab">
                                Lab
                            </option>

                        </select>

                    </div>

                    <!-- CREDIT -->

                    <div class="row">

                        <label>
                            Credit
                        </label>

                        <input type="number"
                               name="credit[]"
                               min="1"
                               max="5"
                               placeholder="Enter credit"
                               required>

                    </div>

                </div>

            </div>

            <!-- BUTTONS -->

            <div class="hero-buttons">

                <button type="button"
                        class="btn-secondary"
                        onclick="addRow()">

                    ➕ Add Another Subject

                </button>

                <button type="submit"
                        class="btn-main">

                    💾 Save All Subjects

                </button>

            </div>

        </form>

        <!-- DIVIDER -->

        <hr>

        <!-- EXCEL UPLOAD -->

        <div class="upload-section">

            <h3>
                📂 Upload from Excel
            </h3>

            <form method="POST"
                  action="/upload_subjects"
                  enctype="multipart/form-data">

                <div class="row">

                    <input type="file"
                           name="file"
                           required>

                </div>

                <button class="btn-main">

                    Upload File

                </button>

            </form>

        </div>

        <!-- BACK -->

        <a href="/"
           class="back-link">

            ⬅ Back to Dashboard

        </a>

    </div>

</div>

<!-- JAVASCRIPT -->

<script>

function addRow() {

    let block =
        document.querySelector(
            ".subject-block"
        );

    let clone =
        block.cloneNode(true);

    clone.querySelectorAll("input")
    .forEach(i => i.value = "");

    document
        .getElementById("subjects")
        .appendChild(clone);
}

</script>

{% endblock %}
